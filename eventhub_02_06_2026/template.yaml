  # ---------------------------------------------------------------------------
  # S3 — Bucket de Documentos (APÓS Lambda functions para evitar dependência circular)
  # ---------------------------------------------------------------------------
  DocumentsBucket:
    Type: AWS::S3::Bucket
    DependsOn: ProcessUploadedDocumentS3Permission
    Properties:
      BucketName: !Sub "${AWS::StackName}-documents-${AWS::AccountId}"
      BucketEncryption:
        ServerSideEncryptionConfiguration:
          - ServerSideEncryptionByDefault:
              SSEAlgorithm: AES256
      PublicAccessBlockConfiguration:
        BlockPublicAcls: true
        BlockPublicPolicy: true
        IgnorePublicAcls: true
        RestrictPublicBuckets: true
      VersioningConfiguration:
        Status: Enabled
      LoggingConfiguration:
        DestinationBucketName: !Ref DocumentsLogsBucket
        LogFilePrefix: access-logs/
      CorsConfiguration:
        CorsRules:
          - AllowedOrigins:
              - "*"
            AllowedMethods:
              - PUT
            AllowedHeaders:
              - "*"
            MaxAge: 3600
      NotificationConfiguration:
        LambdaConfigurations:
          - Event: s3:ObjectCreated:*
            Function: !GetAtt ProcessUploadedDocumentFunction.Arn
            Filter:
              S3Key:
                Rules:
                  - Name: prefix
                    Value: registrations/
      Tags:
        - Key: Project
          Value: EventHub
        - Key: Environment
          Value: Workshop

  DocumentsLogsBucket:
    Type: AWS::S3::Bucket
    Properties:
      BucketName: !Sub "${AWS::StackName}-documents-logs-${AWS::AccountId}"
      BucketEncryption:
        ServerSideEncryptionConfiguration:
          - ServerSideEncryptionByDefault:
              SSEAlgorithm: AES256
      PublicAccessBlockConfiguration:
        BlockPublicAcls: true
        BlockPublicPolicy: true
        IgnorePublicAcls: true
        RestrictPublicBuckets: true
      VersioningConfiguration:
        Status: Enabled
      Tags:
        - Key: Project
          Value: EventHub
        - Key: Environment
          Value: Workshop

  ProcessUploadedDocumentS3Permission:
    Type: AWS::Lambda::Permission
    Properties:
      FunctionName: !Ref ProcessUploadedDocumentFunction
      Action: lambda:InvokeFunction
      Principal: s3.amazonaws.com
      SourceArn: !Sub "arn:aws:s3:::${AWS::StackName}-documents-${AWS::AccountId}"
      SourceAccount: !Ref AWS::AccountId

  # ---------------------------------------------------------------------------
  # Frontend — S3 Bucket para arquivos estáticos
  # ---------------------------------------------------------------------------
  FrontendBucket:
    Type: AWS::S3::Bucket
    Properties:
      BucketName: !Sub "${AWS::StackName}-frontend-${AWS::AccountId}"
      PublicAccessBlockConfiguration:
        BlockPublicAcls: true
        BlockPublicPolicy: true
        IgnorePublicAcls: true
        RestrictPublicBuckets: true
      Tags:
        - Key: Project
          Value: EventHub
        - Key: Environment
          Value: Workshop

  # ---------------------------------------------------------------------------
  # CloudFront — Origin Access Control (OAC) for S3
  # ---------------------------------------------------------------------------
  FrontendOAC:
    Type: AWS::CloudFront::OriginAccessControl
    Properties:
      OriginAccessControlConfig:
        Name: !Sub "${AWS::StackName}-frontend-oac"
        OriginAccessControlOriginType: s3
        SigningBehavior: always
        SigningProtocol: sigv4

  # ---------------------------------------------------------------------------
  # S3 Bucket Policy — CloudFront OAC Access
  # ---------------------------------------------------------------------------
  FrontendBucketPolicy:
    Type: AWS::S3::BucketPolicy
    Properties:
      Bucket: !Ref FrontendBucket
      PolicyDocument:
        Version: "2012-10-17"
        Statement:
          - Sid: AllowCloudFrontServicePrincipal
            Effect: Allow
            Principal:
              Service: cloudfront.amazonaws.com
            Action: s3:GetObject
            Resource: !Sub "${FrontendBucket.Arn}/*"
            Condition:
              StringEquals:
                AWS:SourceArn: !Sub "arn:aws:cloudfront::${AWS::AccountId}:distribution/${FrontendDistribution}"

  # ---------------------------------------------------------------------------
  # CloudFront — Distribution
  # ---------------------------------------------------------------------------
  FrontendDistribution:
    Type: AWS::CloudFront::Distribution
    Properties:
      DistributionConfig:
        Enabled: true
        DefaultRootObject: index.html
        Origins:
          - Id: S3Origin
            DomainName: !GetAtt FrontendBucket.RegionalDomainName
            OriginAccessControlId: !GetAtt FrontendOAC.Id
            S3OriginConfig:
              OriginAccessIdentity: ""
        DefaultCacheBehavior:
          TargetOriginId: S3Origin
          ViewerProtocolPolicy: redirect-to-https
          AllowedMethods: [GET, HEAD]
          CachedMethods: [GET, HEAD]
          ForwardedValues:
            QueryString: false
        CustomErrorResponses:
          - ErrorCode: 403
            ResponseCode: 200
            ResponsePagePath: /index.html
          - ErrorCode: 404
            ResponseCode: 200
            ResponsePagePath: /index.html
      Tags:
        - Key: Project
          Value: EventHub
        - Key: Environment
          Value: Workshop

# =============================================================================
# Outputs
# =============================================================================
Outputs:
  FrontendUrl:
    Description: URL do frontend via CloudFront
    Value: !Sub "https://${FrontendDistribution.DomainName}"
  FrontendBucketName:
    Description: Nome do bucket S3 para deploy do frontend
    Value: !Ref FrontendBucket
  FrontendDistributionId:
    Description: ID da distribuição CloudFront
    Value: !Ref FrontendDistribution
  ApiUrl:
    Description: URL do API Gateway HTTP API
    Value: !Sub "https://${EventHubApi}.execute-api.${AWS::Region}.amazonaws.com"
